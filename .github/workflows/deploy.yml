name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy locally on EC2
        run: |
          cd ~/OCR-Implementez_un_modele_de_scoring/app
          git fetch origin
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          cd ~/OCR-Implementez_un_modele_de_scoring/app
          python3.11 -m pip install --upgrade pip
          python3.11 -m pip install -r requirements.txt

      - name: Run tests
        run: |
          cd ~/OCR-Implementez_un_modele_de_scoring
          python3.11 -m pytest -v pytests

      - name: Rebuild and restart container
        run: |
          cd ~/OCR-Implementez_un_modele_de_scoring/app
          docker stop scoring-container || true
          docker rm scoring-container || true

          docker build -t scoring-app .

          docker run -d \
            --name scoring-container \
            --restart always \
            -p 8501:8501 \
            -p 8000:8000 \
            scoring-app